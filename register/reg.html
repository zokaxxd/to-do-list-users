<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style-reg.css">
</head>
<body>
    <div class="wrapper">
        <h1 class="reg">Register</h1>
            <p class="email">Email</p>
                <input type="email" class="ema" placeholder="Enter your email...">
                    <p class="pas">Password</p>
                        <input type="password" class="password" placeholder="Enter your password...">
                <p class="age">Age</p>
            <input type="number" class="age-input" placeholder="Enter your age...">
        <p class="nam">Name</p>
    <input type="text" class="name-input" placeholder="Enter your name...">
    <button class="reg-btn" id="register-btn">Register</button>
    <script src="script-reg.js"></script>
    </div>
</body>
</html>
